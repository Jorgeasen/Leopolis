name: 🦁 Leópolis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  # ─────────────────────────────────────────────
  # 1. Análisis estático y formato
  # ─────────────────────────────────────────────
  analyze:
    name: 🔍 Analizar código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar formato
        run: dart format --output=none --set-exit-if-changed .

      - name: Análisis estático
        run: flutter analyze --fatal-infos

  # ─────────────────────────────────────────────
  # 2. Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Ejecutar tests
        run: flutter test --coverage

      - name: Upload coverage a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # 3. Build Android
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: leopolis-android-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # 4. Build Windows
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Habilitar Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --debug

      - name: Upload build Windows
        uses: actions/upload-artifact@v4
        with:
          name: leopolis-windows-debug
          path: build/windows/x64/runner/Debug/
          retention-days: 7
