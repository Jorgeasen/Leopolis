name: 🤖 AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: 🧠 Revisión con GitHub Models (GPT-4o)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obtener diff del PR
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.dart' > pr_diff.txt
          echo "lines=$(wc -l < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Revisión de código con GitHub Models
        if: steps.diff.outputs.lines != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install openai --quiet
          python3 .github/scripts/ai_review.py
