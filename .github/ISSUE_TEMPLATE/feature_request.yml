name: ✨ Nueva funcionalidad
description: Sugerir una mejora o nueva funcionalidad para Leópolis
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ¡Genial! El agente de IA analizará tu sugerencia automáticamente.

  - type: textarea
    id: description
    attributes:
      label: ¿Qué te gustaría añadir?
      placeholder: Describe la funcionalidad que propones
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: ¿Por qué sería útil para Leo?
      placeholder: ¿Cómo ayudaría esta funcionalidad al aprendizaje?

  - type: dropdown
    id: module
    attributes:
      label: Módulo relacionado
      options:
        - Las Letras
        - Las Palabras
        - Juegos
        - Mis Premios
        - General / Nuevo módulo
